version: "3.8"

services:

  # ── قاعدة البيانات ──
  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # البيانات تبقى حتى بعد إيقاف الـ container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Jupyter Notebooks ──
  jupyter:
    build:
      context: .
      dockerfile: docker/Dockerfile.jupyter
    container_name: ecommerce-jupyter
    ports:
      - "${JUPYTER_PORT}:8888"
    volumes:
      - ./notebooks:/app/notebooks    # ربط الـ notebooks المحلية
      - ./data:/app/data               # ربط البيانات
      - ./src:/app/src
      - ./mlflow:/app/mlflow
    environment:
      - POSTGRES_HOST=postgres          # يتصل بـ postgres container مباشرة
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy     # ينتظر postgres يكون جاهز أولاً

  # ── FastAPI ──
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ecommerce-api
    ports:
      - "${API_PORT}:8000"
    volumes:
      - ./mlflow:/app/mlflow
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:    # volume دائم للبيانات